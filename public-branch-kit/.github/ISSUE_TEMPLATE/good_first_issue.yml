name: Good first issue
description: Suggest a small contributor-friendly task
title: "[Good first issue]: "
labels:
  - good first issue
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What should be done?
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Suggested files
      description: Which files are likely involved?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - ...
        - `npm run typecheck` passes.
    validations:
      required: true
